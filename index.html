<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Quackmath</title>
    <link id="favicon" rel="icon" type="image/png" href="https://ik.imagekit.io/quackmath/goose%20(1).png">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap");
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Inter", sans-serif; }
        
        body { 
            height: 100vh; background: #000; color: #fff; 
            display: flex; flex-direction: column; align-items: center; 
            overflow: hidden; -webkit-font-smoothing: antialiased;
        }

        :root {
            --bg-gradient: radial-gradient(circle at 20% 30%, rgba(0, 150, 255, 0.15), transparent 40%), 
                           radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.08), transparent 45%);
            --accent-color: #ff9800;
        }

        body::before { 
            content: ""; position: absolute; width: 120%; height: 120%; 
            background: var(--bg-gradient); z-index: -1; 
        }

        /* ANIMATIONS */
        @keyframes welcomeIn { 
            0% { transform: translate(-50px, -50%); opacity: 0; }
            100% { transform: translate(0, -50%); opacity: 1; }
        }
        @keyframes welcomeUp {
            0% { transform: translateY(-50%); }
            100% { transform: translateY(-120%); }
        }
        @keyframes logoFadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* WELCOME SCREEN */
        #welcomeScreen {
            position: fixed; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 3000; background: #000;
        }
        #welcomeLogo {
            width: 100px; margin-bottom: 20px; opacity: 0;
            filter: drop-shadow(0 0 15px rgba(255, 152, 0, 0.4));
        }
        #welcomeText { 
            font-size: 3.5rem; font-weight: 900; position: absolute; top: 50%;
            animation: welcomeIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        #welcomeActions { 
            display: none; gap: 20px; margin-top: 120px; 
            animation: fadeIn 1s ease-out forwards;
        }

        /* CONTAINER & LAYOUT */
        .container { width: 100%; max-width: 1100px; padding: 2rem; display: none; flex-direction: column; align-items: center; }
        
        #search, #proxySearch { 
            width: 100%; max-width: 600px; padding: 1.1rem; border-radius: 14px; 
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255, 255, 255, 0.08); 
            color: white; text-align: center; outline: none; margin-bottom: 40px; 
            font-size: 1.1rem; letter-spacing: 0.5px;
        }

        /* GAMES LIST (No Horizontal Scroll) */
        ul { 
            width: 100%; list-style: none; display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 1.5rem; max-height: 70vh; overflow-y: auto; overflow-x: hidden; 
            padding: 10px; 
        }
        ul::-webkit-scrollbar { width: 6px; }
        ul::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        li a { 
            display: block; padding: 1.8rem; border-radius: 16px; text-decoration: none; 
            color: white; background: rgba(255, 255, 255, 0.05); transition: 0.3s; 
            border: 1px solid rgba(255,255,255,0.03); text-align: center; font-weight: 600; 
            letter-spacing: 0.8px;
        }
        li a:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--accent-color); transform: translateY(-4px); }

        /* BUTTONS */
        .intro-btn { 
            padding: 18px 50px; border-radius: 14px; border: 2px solid var(--accent-color); 
            background: transparent; color: white; font-weight: 700; cursor: pointer; 
            transition: 0.3s; font-size: 1.1rem;
        }
        .intro-btn:hover { background: var(--accent-color); color: #000; transform: scale(1.05); }

        .back-nav {
            margin-bottom: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #ccc; padding: 8px 20px; border-radius: 30px; cursor: pointer; transition: 0.2s;
        }
        .back-nav:hover { color: white; background: rgba(255,255,255,0.1); }

        /* IFRAME */
        #proxyFrameContainer { display: none; position: fixed; inset: 0; background: #000; z-index: 4000; }
        #proxyFrame { width: 100%; height: 100%; border: none; }
        .close-frame { position: fixed; top: 20px; right: 20px; z-index: 4001; padding: 10px 20px; border-radius: 10px; background: rgba(0,0,0,0.6); color: white; border: 1px solid #fff; cursor: pointer; }
    </style>
</head>
<body>

    <div id="welcomeScreen">
        <img id="welcomeLogo" src="https://ik.imagekit.io/quackmath/goose%20(1).png" alt="Logo">
        <h1 id="welcomeText">Welcome to Quackmath</h1>
        <div id="welcomeActions">
            <button class="intro-btn" onclick="startMode('games')">Games</button>
            <button class="intro-btn" onclick="startMode('proxy')">Proxy</button>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <button class="back-nav" onclick="goHome()">← Back to Menu</button>
        
        <div id="homeSection" style="width:100%; text-align:center;">
            <h1 style="margin-bottom:20px; font-weight:900;">Project Library</h1>
            <input type="text" id="search" placeholder="Search filtered library...">
            <ul id="gameList"></ul>
        </div>

        <div id="proxySection" style="display:none; text-align:center;">
            <h2 style="margin-bottom:20px; color:var(--accent-color);">Launch Project URL</h2>
            <input type="text" id="proxySearch" placeholder="google.com">
        </div>
    </div>

    <div id="proxyFrameContainer">
        <button class="close-frame" onclick="closeProxy()">Close Project</button>
        <iframe id="proxyFrame" src=""></iframe>
    </div>

    <script>
        // Intro sequence
        setTimeout(() => {
            const welcomeText = document.getElementById('welcomeText');
            welcomeText.style.animation = 'welcomeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards';
            
            setTimeout(() => {
                const logo = document.getElementById('welcomeLogo');
                logo.style.animation = 'logoFadeIn 0.8s ease forwards';
                document.getElementById('welcomeActions').style.display = 'flex';
            }, 800);
        }, 1400);

        function startMode(mode) {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'flex';
            if(mode === 'games') {
                document.getElementById('homeSection').style.display = 'block';
                document.getElementById('proxySection').style.display = 'none';
            } else {
                document.getElementById('homeSection').style.display = 'none';
                document.getElementById('proxySection').style.display = 'block';
            }
        }

        function goHome() {
            document.getElementById('mainContainer').style.display = 'none';
            document.getElementById('welcomeScreen').style.display = 'flex';
        }

        // Proxy Logic
        document.getElementById('proxySearch').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                let url = e.target.value.trim().replace(/^(?:https?:\/\/)?/i, "");
                const finalUrl = `https://brunysixl.work/active/embed.html?p=http://${url}`;
                document.getElementById('proxyFrame').src = finalUrl;
                document.getElementById('proxyFrameContainer').style.display = 'block';
                window.history.pushState({}, '', "/p?=" + url);
            }
        });

        function closeProxy() {
            document.getElementById('proxyFrameContainer').style.display = 'none';
            document.getElementById('proxyFrame').src = "";
            window.history.pushState({}, '', "/");
        }

        // Game Fetching with specific Filters
        async function fetchGames() {
            try {
                const r = await fetch('https://docs.google.com/document/d/e/2PACX-1vQBKBzjpOyjHA9PHl3NQi3am0RHVYOLMCCyfk5U2QAjqbB5tnG68XRZgGneMnQeAbI-cstsj08j_yhE/pub');
                const html = await r.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const list = document.getElementById('gameList');
                
                doc.querySelectorAll('a').forEach(g => {
                    let name = g.innerText.trim();
                    
                    // Filters
                    const forbidden = ["report abuse", "learn more", "new website", "chat"];
                    if (forbidden.some(word => name.toLowerCase().includes(word)) || name === "") return;

                    // Clean suffix and prefixes
                    if (name.toLowerCase().endsWith(".html")) name = name.slice(0, -5);
                    name = name.replace(/^cl[-\s]?/i, ""); // Specific 'cl' removal
                    
                    // Rename gdlite
                    if (name.toLowerCase() === "gdlite") name = "Geometry Dash";

                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = g.href; a.target = "_blank"; a.innerText = name;
                    li.appendChild(a); list.appendChild(li);
                });
            } catch(e) { console.log("Fetch Error"); }
        }
        fetchGames();
    </script>
</body>
</html>
