<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Quackmath</title>
    <link id="favicon" rel="icon" type="image/png" href="https://ik.imagekit.io/quackmath/goose%20(1).png">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap");
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Inter", sans-serif; }
        
        body { 
            height: 100vh; background: #000; color: #fff; 
            display: flex; flex-direction: column; align-items: center; 
            overflow: hidden; -webkit-font-smoothing: antialiased;
        }

        :root {
            --bg-gradient: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.05), transparent 40%);
            --accent-color: #ff9800;
        }

        body::before { 
            content: ""; position: absolute; width: 100%; height: 100%; 
            background: var(--bg-gradient); z-index: -1; 
        }

        /* ANIMATIONS */
        @keyframes welcomeIn { 
            0% { transform: translate(-50px, -50%); opacity: 0; }
            100% { transform: translate(0, -50%); opacity: 1; }
        }
        @keyframes welcomeUp {
            0% { transform: translateY(-50%); }
            100% { transform: translateY(-120%); }
        }
        @keyframes actionFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* WELCOME SCREEN */
        #welcomeScreen {
            position: fixed; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 3000; background: #000;
        }
        
        /* LOGO RAISED HIGH */
        #welcomeLogo {
            width: 100px; position: absolute; top: 15%; opacity: 0;
            filter: drop-shadow(0 0 15px rgba(255, 152, 0, 0.2));
        }

        #welcomeText { 
            font-size: 3.5rem; font-weight: 900; position: absolute; top: 50%;
            animation: welcomeIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }

        /* BUTTONS TIED TO TEXT */
        #welcomeActions { 
            display: none; gap: 15px; margin-top: 65px; /* Keeps them close to the text */
            animation: actionFade 0.6s ease-out forwards;
        }

        /* CONTAINER */
        .container { 
            width: 100%; max-width: 1200px; padding: 2rem; display: none; 
            flex-direction: column; align-items: center; 
        }
        
        #search, #proxySearch { 
            width: 100%; max-width: 700px; padding: 1.2rem; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255, 255, 255, 0.07); 
            color: white; text-align: center; outline: none; margin-bottom: 25px; font-size: 1.2rem;
        }

        /* 4 BUTTONS PER ROW GRID */
        ul { 
            width: 100%; list-style: none; display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 1rem; max-height: 55vh; overflow-y: auto; overflow-x: hidden; 
            padding: 10px; 
        }

        /* Mobile fallback for the grid */
        @media (max-width: 900px) { ul { grid-template-columns: repeat(2, 1fr); } }

        li a { 
            display: block; padding: 1.4rem; border-radius: 12px; text-decoration: none; 
            color: white; background: rgba(255, 255, 255, 0.04); transition: 0.2s; 
            border: 1px solid rgba(255,255,255,0.02); text-align: center; font-weight: 700; 
            font-size: 0.95rem;
        }
        li a:hover { background: rgba(255, 255, 255, 0.08); border-color: var(--accent-color); }

        .intro-btn { 
            padding: 15px 40px; border-radius: 10px; border: 2px solid var(--accent-color); 
            background: transparent; color: white; font-weight: 800; cursor: pointer; 
            transition: 0.3s; font-size: 1rem;
        }
        .intro-btn:hover { background: var(--accent-color); color: #000; }

        .back-nav {
            margin-bottom: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #777; padding: 7px 18px; border-radius: 30px; cursor: pointer;
        }

        .footnote { margin-top: 30px; font-size: 0.7rem; color: rgba(255, 255, 255, 0.2); font-weight: 600; }

        /* PROXY OVERLAY */
        #proxyFrameContainer { display: none; position: fixed; inset: 0; background: #000; z-index: 4000; }
        #proxyFrame { width: 100%; height: 100%; border: none; }
        
        .close-frame { 
            position: fixed; top: 20px; right: 20px; z-index: 4001; 
            padding: 10px 20px; background: #000; color: #fff; 
            border: 1px solid #444; font-weight: 700; cursor: pointer; 
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="welcomeScreen">
        <img id="welcomeLogo" src="https://ik.imagekit.io/quackmath/goose%20(1).png" alt="Logo">
        <h1 id="welcomeText">Welcome to Quackmath</h1>
        <div id="welcomeActions">
            <button class="intro-btn" onclick="startMode('games')">Games</button>
            <button class="intro-btn" onclick="startMode('proxy')">Proxy</button>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <button class="back-nav" onclick="goHome()">← Back</button>
        
        <div id="homeSection" style="width:100%; text-align:center;">
            <h1 style="margin-bottom:20px; font-weight:900;">Project Library</h1>
            <input type="text" id="search" placeholder="Search...">
            <ul id="gameList"></ul>
            <p class="footnote">MADE BY QUACKMATH STUDIOS</p>
        </div>

        <div id="proxySection" style="display:none; text-align:center;">
            <h1 style="margin-bottom:20px; font-weight:900;">Project Proxy</h1>
            <input type="text" id="proxySearch" placeholder="Enter URL...">
        </div>
    </div>

    <div id="proxyFrameContainer">
        <button class="close-frame" onclick="closeProxy()">Exit</button>
        <iframe id="proxyFrame" src=""></iframe>
    </div>

    <script>
        // Intro Animation Sequence
        setTimeout(() => {
            const welcomeText = document.getElementById('welcomeText');
            welcomeText.style.animation = 'welcomeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards';
            
            setTimeout(() => {
                const logo = document.getElementById('welcomeLogo');
                logo.style.opacity = '1';
                logo.style.transition = 'opacity 0.8s ease';
                document.getElementById('welcomeActions').style.display = 'flex';
            }, 700);
        }, 1000);

        function startMode(mode) {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'flex';
            if(mode === 'games') {
                document.getElementById('homeSection').style.display = 'block';
                document.getElementById('proxySection').style.display = 'none';
            } else {
                document.getElementById('homeSection').style.display = 'none';
                document.getElementById('proxySection').style.display = 'block';
            }
        }

        function goHome() {
            document.getElementById('mainContainer').style.display = 'none';
            document.getElementById('welcomeScreen').style.display = 'flex';
        }

        document.getElementById('proxySearch').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                let url = e.target.value.trim().replace(/^(?:https?:\/\/)?/i, "");
                if(!url) return;
                document.getElementById('proxyFrame').src = `https://brunysixl.work/active/embed.html?p=http://${url}`;
                document.getElementById('proxyFrameContainer').style.display = 'block';
            }
        });

        function closeProxy() {
            document.getElementById('proxyFrameContainer').style.display = 'none';
            document.getElementById('proxyFrame').src = "";
        }

        async function fetchGames() {
            try {
                const r = await fetch('https://docs.google.com/document/d/e/2PACX-1vQBKBzjpOyjHA9PHl3NQi3am0RHVYOLMCCyfk5U2QAjqbB5tnG68XRZgGneMnQeAbI-cstsj08j_yhE/pub');
                const html = await r.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const list = document.getElementById('gameList');
                
                doc.querySelectorAll('a').forEach(g => {
                    let name = g.innerText.trim();
                    const forbidden = ["report abuse", "learn more", "new website", "chat"];
                    if (forbidden.some(word => name.toLowerCase().includes(word)) || name === "") return;
                    if (name.toLowerCase().endsWith(".html")) name = name.slice(0, -5);
                    name = name.replace(/^cl[-\s]?/i, ""); 
                    if (name.toLowerCase() === "gdlite") name = "Geometry Dash";

                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = g.href; a.target = "_blank"; a.innerText = name;
                    li.appendChild(a); list.appendChild(li);
                });
            } catch(e) {}
        }
        
        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            document.querySelectorAll('#gameList li').forEach(li => {
                li.style.display = li.innerText.toLowerCase().includes(val) ? "block" : "none";
            });
        });

        fetchGames();
    </script>
</body>
</html>
