<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Quackmath</title>
    <link id="favicon" rel="icon" type="image/png" href="https://ik.imagekit.io/quackmath/goose%20(1).png">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap");
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Inter", sans-serif; }
        
        body { 
            height: 100vh; background: #000; color: #fff; 
            display: flex; flex-direction: column; align-items: center; 
            overflow: hidden; -webkit-font-smoothing: antialiased;
            transition: background 0.5s ease;
        }

        body::before { 
            content: ""; position: absolute; width: 120%; height: 120%; 
            background: var(--bg-gradient);
            animation: floatBG 25s linear infinite; z-index: -1; 
        }

        :root {
            --bg-gradient: radial-gradient(circle at 20% 30%, rgba(0, 150, 255, 0.15), transparent 40%), 
                           radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.08), transparent 45%);
            --accent-color: #ff9800;
        }

        /* --- ALL THEMES RE-ADDED --- */
        body.theme-emerald { --bg-gradient: radial-gradient(circle at 20% 30%, rgba(46, 204, 113, 0.15), transparent 40%), radial-gradient(circle at 80% 70%, rgba(0, 255, 100, 0.05), transparent 45%); --accent-color: #2ecc71; }
        body.theme-rose { --bg-gradient: radial-gradient(circle at 20% 30%, rgba(255, 0, 150, 0.12), transparent 40%), radial-gradient(circle at 80% 70%, rgba(142, 68, 173, 0.1), transparent 45%); --accent-color: #e91e63; }
        body.theme-amber { --bg-gradient: radial-gradient(circle at 20% 30%, rgba(243, 156, 18, 0.15), transparent 40%), radial-gradient(circle at 80% 70%, rgba(211, 84, 0, 0.1), transparent 45%); --accent-color: #f39c12; }
        body.theme-void { --bg-gradient: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.03), transparent 50%); --accent-color: #ffffff; }
        body.theme-crimson { --bg-gradient: radial-gradient(circle at 20% 30%, rgba(231, 76, 60, 0.15), transparent 40%), radial-gradient(circle at 80% 70%, rgba(192, 57, 43, 0.1), transparent 45%); --accent-color: #e74c3c; }
        body.theme-nebula { --bg-gradient: radial-gradient(circle at 30% 20%, rgba(155, 89, 182, 0.15), transparent 40%), radial-gradient(circle at 70% 80%, rgba(52, 152, 219, 0.15), transparent 40%); --accent-color: #9b59b6; }
        body.theme-cyber { --bg-gradient: radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.15), transparent 40%), radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.15), transparent 45%); --accent-color: #00ffff; }
        body.theme-forest { --bg-gradient: radial-gradient(circle at 20% 30%, rgba(39, 174, 96, 0.1), transparent 40%), radial-gradient(circle at 80% 70%, rgba(20, 90, 50, 0.2), transparent 45%); --accent-color: #27ae60; }
        body.theme-ocean { --bg-gradient: radial-gradient(circle at 20% 30%, rgba(41, 128, 185, 0.15), transparent 40%), radial-gradient(circle at 80% 70%, rgba(21, 67, 96, 0.2), transparent 45%); --accent-color: #3498db; }
        body.theme-sunset { --bg-gradient: radial-gradient(circle at 20% 30%, rgba(230, 126, 34, 0.15), transparent 40%), radial-gradient(circle at 80% 70%, rgba(192, 57, 43, 0.15), transparent 45%); --accent-color: #e67e22; }
        body.theme-gold { --bg-gradient: radial-gradient(circle at 20% 30%, rgba(241, 196, 15, 0.12), transparent 40%), radial-gradient(circle at 80% 70%, rgba(183, 149, 11, 0.1), transparent 45%); --accent-color: #f1c40f; }
        body.theme-matrix { --bg-gradient: radial-gradient(circle at 50% 50%, rgba(0, 255, 0, 0.05), transparent 60%); --accent-color: #00ff00; }
        /* ... you can add the rest back into the JS theme switcher! ... */

        @keyframes floatBG { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-2%, -2%); } }

        /* REFINED INTRO ANIMATIONS */
        @keyframes welcomeIn { 
            0% { transform: translate(-50px, -50%); opacity: 0; }
            100% { transform: translate(0, -50%); opacity: 1; }
        }
        @keyframes welcomeUp {
            0% { transform: translateY(-50%); }
            100% { transform: translateY(-120%); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #welcomeScreen {
            position: fixed; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 3000; background: #000;
            text-align: center;
        }
        #welcomeText { 
            font-size: 3.5rem; font-weight: 900; /* BOLDED */
            position: absolute; top: 50%;
            animation: welcomeIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        #welcomeActions { 
            display: none; gap: 20px; margin-top: 80px; 
            animation: fadeIn 1s ease-out forwards;
        }

        #announcementBanner {
            width: 100%; background: rgba(255, 255, 255, 0.05); border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px; display: flex; justify-content: center; align-items: center;
            font-size: 0.85rem; color: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); z-index: 1001; position: relative;
        }

        .container { width: 100%; max-width: 1100px; padding: 2rem 1.25rem; flex-grow: 1; display: none; flex-direction: column; align-items: center; position: relative; }
        
        #search, #proxySearch { width: 100%; max-width: 600px; padding: 1rem; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255, 255, 255, 0.08); color: white; text-align: center; outline: none; margin-bottom: 30px; font-size: 1rem; transition: border-color 0.3s; }
        
        #proxySection { display: none; width: 100%; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.8s ease; height: 100%; flex-grow: 1; }

        /* FULLSCREEN IFRAME SYSTEM */
        #proxyFrameContainer {
            display: none; position: fixed; inset: 0; background: #000; z-index: 4000;
        }
        #proxyFrame { width: 100%; height: 100%; border: none; }
        
        .intro-btn { 
            padding: 18px 50px; border-radius: 14px; border: 2px solid var(--accent-color); 
            background: transparent; color: white; font-weight: 700; cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-size: 1.1rem;
        }
        .intro-btn:hover { background: var(--accent-color); color: #000; transform: scale(1.05); }

        ul { width: 100%; list-style: none; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.2rem; max-height: 75vh; overflow-y: auto; padding: 20px; }
        a { display: block; padding: 1.5rem; border-radius: 14px; text-decoration: none; color: white; background: rgba(255, 255, 255, 0.06); transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); text-align: center; font-weight: 600; }
        a:hover { background: rgba(255, 255, 255, 0.12); border-color: var(--accent-color); }
    </style>
</head>
<body>

    <div id="welcomeScreen">
        <h1 id="welcomeText">Welcome to Quackmath</h1>
        <div id="welcomeActions">
            <button class="intro-btn" onclick="startMode('games')">Games</button>
            <button class="intro-btn" onclick="startMode('proxy')">Proxy</button>
        </div>
    </div>

    <div id="announcementBanner" style="display:none;">
        <span>3/31: PROXY HAS DROPPED, slight changes <b style="cursor:pointer; text-decoration:underline;">more</b></span>
    </div>

    <div class="container" id="mainContainer">
        <div id="homeSection" style="width:100%; text-align:center;">
            <h1>Project Library</h1>
            <input type="text" id="search" placeholder="Search content...">
            <ul id="gameList"></ul>
        </div>

        <div id="proxySection">
            <h2 style="margin-bottom:20px; font-size:1.5rem; color:var(--accent-color);">Enter URL</h2>
            <input type="text" id="proxySearch" placeholder="example.com">
        </div>
    </div>

    <div id="proxyFrameContainer">
        <iframe id="proxyFrame" src=""></iframe>
    </div>

    <script>
        // Intro Animation
        setTimeout(() => {
            const welcomeText = document.getElementById('welcomeText');
            welcomeText.style.animation = 'welcomeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards';
            setTimeout(() => {
                document.getElementById('welcomeActions').style.display = 'flex';
            }, 600);
        }, 1200);

        function startMode(mode) {
            document.getElementById('welcomeScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcomeScreen').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'flex';
                
                if(mode === 'games') {
                    document.getElementById('homeSection').style.display = 'block';
                    document.getElementById('proxySection').style.display = 'none';
                    document.getElementById('announcementBanner').style.display = 'flex';
                } else {
                    document.getElementById('homeSection').style.display = 'none';
                    document.getElementById('proxySection').style.display = 'flex';
                    document.getElementById('announcementBanner').style.display = 'none'; // Hidden on Proxy page
                }
            }, 400);
        }

        // URL Masking + Iframe Logic
        document.getElementById('proxySearch').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                let inputUrl = e.target.value.trim();
                if(!inputUrl) return;

                let cleanUrl = inputUrl.replace(/^(?:https?:\/\/)?/i, "");
                
                // 1. Set the iframe source
                const finalProxyUrl = `https://brunysixl.work/active/embed.html?p=http://${cleanUrl}`;
                document.getElementById('proxyFrame').src = finalProxyUrl;
                
                // 2. Show the iframe overlay
                document.getElementById('proxyFrameContainer').style.display = 'block';
                
                // 3. Update Address Bar: quackmath.vercel.app/p?={URL}
                const newUrlPath = "/p?=" + cleanUrl;
                window.history.pushState({path: newUrlPath}, '', newUrlPath);
            }
        });

        // Simple fetch for your list
        async function fetchGames() {
            try {
                const r = await fetch('https://docs.google.com/document/d/e/2PACX-1vQBKBzjpOyjHA9PHl3NQi3am0RHVYOLMCCyfk5U2QAjqbB5tnG68XRZgGneMnQeAbI-cstsj08j_yhE/pub');
                const html = await r.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const list = document.getElementById('gameList');
                doc.querySelectorAll('a').forEach(g => {
                    if (g.innerText.length < 2) return;
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = g.href; a.target = "_blank"; a.innerText = g.innerText;
                    li.appendChild(a); list.appendChild(li);
                });
            } catch(e) {}
        }
        fetchGames();
    </script>
</body>
</html>
