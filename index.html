<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quackmath</title>
    <link rel="icon" type="image/png" href="https://ik.imagekit.io/quackmath/goose%20(1).png">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap");
        
        * { margin: 0; padding: 0; box-sizing: border-box !important; font-family: "Inter", sans-serif; }
        
        body { 
            height: 100vh; background: #000 !important; color: #fff; 
            display: flex; flex-direction: column; align-items: center; 
            overflow: hidden;
        }

        /* WELCOME SCREEN - LOGO & BUTTONS SYMMETRY */
        #welcomeScreen {
            position: fixed; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 3000; background: #000;
        }
        
        #welcomeLogo {
            width: 100px; 
            margin-bottom: 80px !important; /* RAISED LOGO */
            opacity: 0;
            animation: fadeInSlide 0.8s ease 1.5s forwards;
        }

        #welcomeText { 
            font-size: 3.5rem; font-weight: 900; 
            position: relative;
            z-index: 3002;
        }

        #welcomeActions { 
            display: flex; gap: 15px; 
            margin-top: 80px !important; /* MATCHING BUTTON DISTANCE */
            opacity: 0;
            animation: fadeInSlide 0.8s ease 1.5s forwards;
        }

        /* GRID FIX - 4 COLUMNS NO MATTER WHAT */
        #gameList { 
            width: 100% !important;
            display: grid !important; 
            grid-template-columns: 23% 23% 23% 23% !important; /* HARD 4 COLUMNS */
            justify-content: center !important;
            gap: 15px !important; 
            list-style: none;
            overflow-y: auto;
            max-height: 60vh;
            padding: 20px;
        }

        #gameList li a { 
            display: block; width: 100%; padding: 20px 10px; border-radius: 12px; 
            text-decoration: none; color: white; background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255,255,255,0.1); text-align: center; font-weight: 700;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        /* FOOTER */
        .footnote { 
            position: absolute; bottom: 10px; width: 100%; text-align: center;
            font-size: 0.75rem; color: rgba(255,255,255,0.3); font-weight: 800; 
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* PROXY EXIT - BOTTOM RIGHT & SMALL */
        .close-frame { 
            position: fixed; bottom: 15px; right: 15px; z-index: 4001; 
            padding: 5px 12px; background: #000; color: #fff; 
            border: 1px solid #444; font-weight: 700; cursor: pointer; 
            border-radius: 4px; font-size: 0.7rem;
        }

        /* ANIMATIONS */
        @keyframes fadeInSlide { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .container { width: 100%; max-width: 1400px; display: none; flex-direction: column; align-items: center; padding: 20px; }
        #proxyFrameContainer { display: none; position: fixed; inset: 0; background: #000; z-index: 4000; }
        #proxyFrame { width: 100%; height: 100%; border: none; }
        #search { width: 100%; max-width: 600px; padding: 15px; margin-bottom: 20px; border-radius: 10px; background: #111; color: #fff; border: 1px solid #333; text-align: center; }
    </style>
</head>
<body>

    <div id="welcomeScreen">
        <img id="welcomeLogo" src="https://ik.imagekit.io/quackmath/goose%20(1).png">
        <h1 id="welcomeText">Welcome to Quackmath</h1>
        <div id="welcomeActions">
            <button style="padding: 15px 40px; border: 2px solid #ff9800; background: none; color: #fff; border-radius: 10px; cursor: pointer; font-weight: 800;" onclick="start('games')">GAMES</button>
            <button style="padding: 15px 40px; border: 2px solid #ff9800; background: none; color: #fff; border-radius: 10px; cursor: pointer; font-weight: 800;" onclick="start('proxy')">PROXY</button>
        </div>
    </div>

    <div class="container" id="main">
        <button onclick="location.reload()" style="align-self: flex-start; color: #666; background: none; border: none; cursor: pointer; margin-bottom: 10px;">← BACK</button>
        <div id="homeSection" style="width: 100%;">
            <h1 style="text-align: center; margin-bottom: 20px;">Project Library</h1>
            <center><input type="text" id="search" placeholder="Search..."></center>
            <ul id="gameList"></ul>
            <div class="footnote">Made by Quackmath Studios</div>
        </div>
    </div>

    <div id="proxyFrameContainer">
        <button class="close-frame" onclick="location.reload()">EXIT</button>
        <iframe id="proxyFrame"></iframe>
    </div>

    <script>
        function start(mode) {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
        }

        async function fetchGames() {
            try {
                const r = await fetch('https://docs.google.com/document/d/e/2PACX-1vQBKBzjpOyjHA9PHl3NQi3am0RHVYOLMCCyfk5U2QAjqbB5tnG68XRZgGneMnQeAbI-cstsj08j_yhE/pub');
                const html = await r.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const list = document.getElementById('gameList');
                doc.querySelectorAll('a').forEach(g => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = g.href; a.target = "_blank"; a.innerText = g.innerText;
                    li.appendChild(a); list.appendChild(li);
                });
            } catch(e) {}
        }
        fetchGames();
    </script>
</body>
</html>
