<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quackmath</title>
    <link rel="icon" type="image/png" href="https://ik.imagekit.io/quackmath/goose%20(1).png">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap");
        
        * { margin: 0; padding: 0; box-sizing: border-box !important; font-family: "Inter", sans-serif; }
        
        body { 
            height: 100vh; background: #000; color: #fff; 
            display: flex; flex-direction: column; align-items: center; 
            overflow: hidden;
        }

        /* --- ANIMATIONS --- */
        @keyframes slideIn { 
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        @keyframes textReveal {
            0% { letter-spacing: -10px; opacity: 0; filter: blur(10px); }
            100% { letter-spacing: 0px; opacity: 1; filter: blur(0px); }
        }

        /* WELCOME SCREEN - PRECISE SPACING */
        #welcomeScreen {
            position: fixed; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 3000; background: #000;
        }
        
        #welcomeLogo {
            width: 100px; margin-bottom: 80px !important; /* 80px SPACING ABOVE */
            filter: drop-shadow(0 0 15px rgba(255, 152, 0, 0.3));
            animation: slideIn 1s ease forwards;
        }

        #welcomeText { 
            font-size: 3.5rem; font-weight: 900; text-align: center;
            animation: textReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        #welcomeActions { 
            display: flex; gap: 20px; margin-top: 80px !important; /* 80px SPACING BELOW */
            opacity: 0; animation: slideIn 1s ease 0.5s forwards;
        }

        /* MAIN CONTAINER */
        .container { 
            width: 95%; max-width: 1400px; height: 100vh; padding: 20px; 
            display: none; flex-direction: column; align-items: center; 
        }

        /* HARD 4-COLUMN GRID - NO WRAPPING */
        #gameList { 
            width: 100%; display: grid !important; 
            grid-template-columns: repeat(4, 1fr) !important; 
            gap: 15px; list-style: none; overflow-y: auto; flex-grow: 1; padding: 10px;
        }

        #gameList li a { 
            display: block; width: 100%; padding: 25px 10px; border-radius: 12px; 
            text-decoration: none; color: white; background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255,255,255,0.1); text-align: center; font-weight: 700;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* GLOW EFFECT ON ALL CLICKABLES */
        #gameList li a:hover, .intro-btn:hover, .back-btn:hover { 
            border-color: #ff9800 !important; 
            box-shadow: 0 0 20px rgba(255, 152, 0, 0.4);
            transform: translateY(-4px); 
            background: rgba(255, 152, 0, 0.05);
        }

        /* PROXY CENTERED */
        #proxySection {
            width: 100%; flex-grow: 1; display: none; flex-direction: column; 
            align-items: center; justify-content: center; 
        }

        #search, #proxySearch { 
            width: 100%; max-width: 600px; padding: 18px; border-radius: 12px; 
            background: #111; color: #fff; border: 1px solid #333; text-align: center; 
            transition: 0.3s; outline: none; margin-bottom: 20px;
        }
        #search:focus, #proxySearch:focus { border-color: #ff9800; box-shadow: 0 0 15px rgba(255, 152, 0, 0.2); }

        .intro-btn { 
            padding: 15px 45px; border: 2px solid #ff9800; background: none; 
            color: #fff; border-radius: 10px; cursor: pointer; font-weight: 800; 
            transition: 0.3s;
        }
        .intro-btn:hover { background: #ff9800; color: #000; }

        .back-btn {
            align-self: flex-start; color: #888; background: rgba(255,255,255,0.05); 
            border: 1px solid #333; padding: 8px 22px; border-radius: 30px; 
            cursor: pointer; font-weight: 700; margin-bottom: 20px;
        }

        .footnote { 
            width: 100%; text-align: center; padding: 20px 0; font-size: 0.75rem; 
            color: rgba(255, 255, 255, 0.2); font-weight: 800; text-transform: uppercase; 
        }

        #proxyFrameContainer { display: none; position: fixed; inset: 0; background: #000; z-index: 4000; }
        #proxyFrame { width: 100%; height: 100%; border: none; }
        .close-frame { position: fixed; bottom: 20px; right: 20px; z-index: 4001; padding: 8px 16px; background: #000; color: #fff; border: 1px solid #444; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="welcomeScreen">
        <img id="welcomeLogo" src="https://ik.imagekit.io/quackmath/goose%20(1).png">
        <h1 id="welcomeText">Welcome to Quackmath</h1>
        <div id="welcomeActions">
            <button class="intro-btn" onclick="openMode('games')">GAMES</button>
            <button class="intro-btn" onclick="openMode('proxy')">PROXY</button>
        </div>
    </div>

    <div class="container" id="main">
        <button class="back-btn" onclick="goBack()">← BACK</button>
        
        <div id="homeSection" style="width: 100%; display: none; flex-direction: column; align-items: center; height: 100%;">
            <h1 style="margin-bottom: 20px; font-size: 2.8rem; font-weight: 900;">Project Library</h1>
            <input type="text" id="search" placeholder="Search for a project...">
            <ul id="gameList"></ul>
            <div class="footnote">Made by Quackmath Studios</div>
        </div>

        <div id="proxySection">
            <h1 style="margin-bottom: 30px; font-size: 2.8rem; font-weight: 900;">Project Proxy</h1>
            <input type="text" id="proxySearch" placeholder="Type URL and hit Enter...">
        </div>
    </div>

    <div id="proxyFrameContainer">
        <button class="close-frame" onclick="closeProxy()">EXIT PROXY</button>
        <iframe id="proxyFrame"></iframe>
    </div>

    <script>
        function openMode(mode) {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            if(mode === 'games') {
                document.getElementById('homeSection').style.display = 'flex';
                document.getElementById('proxySection').style.display = 'none';
            } else {
                document.getElementById('homeSection').style.display = 'none';
                document.getElementById('proxySection').style.display = 'flex';
            }
        }

        function goBack() {
            document.getElementById('main').style.display = 'none';
            document.getElementById('welcomeScreen').style.display = 'flex';
        }

        // PROXY LOGIC
        document.getElementById('proxySearch').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                let url = this.value.trim().replace(/^(?:https?:\/\/)?/i, "");
                document.getElementById('proxyFrame').src = "https://brunysixl.work/active/embed.html?p=http://" + url;
                document.getElementById('proxyFrameContainer').style.display = 'block';
            }
        });

        function closeProxy() {
            document.getElementById('proxyFrameContainer').style.display = 'none';
            document.getElementById('proxyFrame').src = "";
        }

        // AGGRESSIVE SEARCH FILTER
        document.getElementById('search').addEventListener('input', function() {
            let val = this.value.toLowerCase().trim();
            let items = document.querySelectorAll('#gameList li');
            
            items.forEach(li => {
                let text = li.textContent.toLowerCase();
                // If value is empty or text matches, show it
                if (val === "" || text.includes(val)) {
                    li.style.setProperty('display', 'block', 'important');
                } else {
                    li.style.setProperty('display', 'none', 'important');
                }
            });
        });

        // FETCHING DATA
        async function fetchGames() {
            try {
                const r = await fetch('https://docs.google.com/document/d/e/2PACX-1vQBKBzjpOyjHA9PHl3NQi3am0RHVYOLMCCyfk5U2QAjqbB5tnG68XRZgGneMnQeAbI-cstsj08j_yhE/pub');
                const html = await r.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const list = document.getElementById('gameList');
                
                doc.querySelectorAll('a').forEach(g => {
                    const name = g.innerText.trim();
                    if(!name || name.length < 2 || name.toLowerCase().includes("report abuse")) return;
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = g.href; a.target = "_blank"; a.innerText = name;
                    li.appendChild(a); list.appendChild(li);
                });
            } catch(e) { console.log("Fetch error"); }
        }
        fetchGames();
    </script>
</body>
</html>
